    <script>
      // Reliable mobile viewport height — recalculated on real resize/orientation
      // events instead of trusting each browser's dvh implementation, which is
      // what caused the bottom nav / top bar to jump or clip on some phones.
      (function () {
        function setVH() {
          document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px')
        }
        setVH()
        window.addEventListener('resize', setVH)
        window.addEventListener('orientationchange', setVH)
      })()
    </script>

  </body>
